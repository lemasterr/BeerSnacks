<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="12" fill="#f5f5f5"/>
  <g stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Can -->
    <rect x="28" y="22" width="24" height="38" rx="4" fill="#e8e8e8" stroke="#333"/>
    <!-- Top rim -->
    <ellipse cx="40" cy="24" rx="12" ry="3" fill="#ddd" stroke="#333"/>
    <!-- Tab -->
    <ellipse cx="40" cy="22" rx="4" ry="1.5" fill="#ccc" stroke="#333"/>
    <!-- Label band -->
    <rect x="28" y="36" width="24" height="12" fill="#d8d8d8" stroke="#333"/>
    <!-- Bubbles -->
    <circle cx="36" cy="42" r="1" fill="#bbb"/>
    <circle cx="42" cy="40" r="0.8" fill="#bbb"/>
    <circle cx="39" cy="44" r="0.6" fill="#bbb"/>
  </g>
</svg>
