<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Beer&Snacks — Craft drinks and tasty snacks catalog in Tallinn. Beer, cider, soft drinks, sweets and snacks." />
  <title>Beer&Snacks — Catalog</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════ Language Selector Overlay ═══════════════ -->
  <div class="lang-overlay" id="lang-overlay">
    <div class="lang-overlay__logo">Beer&amp;Snacks</div>
    <div class="lang-overlay__title" id="overlay-title">Choose your language</div>
    <div class="lang-overlay__buttons">
      <button class="lang-overlay__btn" data-lang="uk">🇺🇦&ensp;Українська</button>
      <button class="lang-overlay__btn" data-lang="en">🇬🇧&ensp;English</button>
      <button class="lang-overlay__btn" data-lang="et">🇪🇪&ensp;Eesti</button>
      <button class="lang-overlay__btn" data-lang="ru">🇷🇺&ensp;Русский</button>
    </div>
  </div>

  <!-- ═══════════════ Main Content ═══════════════ -->
  <div id="main-content" class="main-content" style="display: none;">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header__inner">
        <div class="header__logo">Beer<span>&amp;</span>Snacks</div>
        <div class="header__right">
          <div class="lang-switcher" id="lang-switcher">
            <button class="lang-switcher__current" id="lang-current">
              <span class="lang-switcher__label">English</span>
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 4.5L6 7.5L9 4.5"/>
              </svg>
            </button>
            <div class="lang-switcher__dropdown" id="lang-dropdown"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Categories ── -->
    <nav class="categories">
      <div class="categories__list" id="categories-list"></div>
    </nav>

    <!-- ── Subcategories ── -->
    <div class="subcategories" id="subcategories">
      <div class="subcategories__list" id="subcategories-list"></div>
    </div>

    <!-- ── Product List ── -->
    <section class="product-list">
      <div class="product-list__items" id="product-items"></div>
    </section>

    <!-- ── Footer ── -->
    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__about" id="footer-about"></div>
        <div class="footer__details">
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-phone-label">Phone</span>
            <span class="footer__detail-value"> - </span>
          </div>
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-address-label">Address</span>
            <span class="footer__detail-value" id="footer-address-value">Õismäe tee 1a, 13514 Tallinn</span>
          </div>
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-hours-label">Hours</span>
            <span class="footer__detail-value" id="footer-hours-value">Mon–Fri: 13:00–22:00 | Sat-Sun: 10:00–22:00</span>
          </div>
        </div>
      </div>
      <div class="footer__bottom" id="footer-rights">© 2026 Beer&amp;Snacks. All rights reserved.</div>
    </footer>

  </div>

  <!-- ── Scripts ── -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
