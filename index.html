<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Beer&Snacks — Craft drinks and tasty snacks catalog in Tallinn. Beer, cider, soft drinks, sweets and snacks." />
  <title>Beer&Snacks</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════ Language Selector Overlay ═══════════════ -->
  <div class="lang-overlay" id="lang-overlay">
    <div class="lang-overlay__logo">Beer&amp;Snacks</div>
    <div class="lang-overlay__title" id="overlay-title">Choose your language</div>
    <div class="lang-overlay__buttons">
      <button class="lang-overlay__btn" data-lang="uk">🇺🇦&ensp;Українська</button>
      <button class="lang-overlay__btn" data-lang="en">🇬🇧&ensp;English</button>
      <button class="lang-overlay__btn" data-lang="et">🇪🇪&ensp;Eesti</button>
      <button class="lang-overlay__btn" data-lang="ru">🇷🇺&ensp;Русский</button>
    </div>
  </div>

  <!-- ═══════════════ Main Content ═══════════════ -->
  <div id="main-content" class="main-content" style="display: none;">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header__inner">
        <div class="header__logo">Beer<span>&amp;</span>Snacks</div>
        <div class="header__right">
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
            <svg class="theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <div class="lang-switcher" id="lang-switcher">
            <button class="lang-switcher__current" id="lang-current">
              <span class="lang-switcher__label">English</span>
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 4.5L6 7.5L9 4.5"/>
              </svg>
            </button>
            <div class="lang-switcher__dropdown" id="lang-dropdown"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Categories ── -->
    <nav class="categories">
      <div class="categories__list" id="categories-list"></div>
    </nav>

    <!-- ── Subcategories ── -->
    <div class="subcategories" id="subcategories">
      <div class="subcategories__list" id="subcategories-list"></div>
    </div>

    <!-- ── Product List ── -->
    <section class="product-list">
      <div class="product-list__items" id="product-items"></div>
    </section>

    <!-- ── Footer ── -->
    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__about" id="footer-about"></div>
        <div class="footer__details">
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-phone-label">Phone</span>
            <span class="footer__detail-value"> - </span>
          </div>
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-address-label">Address</span>
            <span class="footer__detail-value" id="footer-address-value">Õismäe tee 1a, 13514 Tallinn</span>
            <span class="footer__detail-value" id="footer-address-value">Mahtra tn 1, 13811 Tallinn</span>
          </div>
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-hours-label">Hours</span>
            <span class="footer__detail-value" id="footer-hours-value">Mon–Fri: 13:00–22:00 | Sat-Sun: 10:00–22:00</span>
          </div>
          <div class="footer__detail">
            <span class="footer__detail-label" id="footer-email-label">Email</span>
            <span class="footer__detail-value" id="footer-email-value"><a href="mailto:beermix.ee@gmail.com" style="color: inherit; text-decoration: none;">beermix.ee@gmail.com</a></span>
          </div>
        </div>
      </div>
      
      <!-- Social Media and Delivery Links -->
      <div class="footer__links">
        <div class="footer__socials">
          <a href="https://www.facebook.com/people/BeerSnacks/61574467306145/" target="_blank" aria-label="Facebook">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M14 13.5h2.5l1-4H14v-2c0-1.03 0-2 2-2h1.5V2.14c-.326-.043-1.557-.14-2.857-.14C11.928 2 10 3.657 10 6.7v2.8H7v4h3V22h4v-8.5z"/>
            </svg>
          </a>
          <a href="https://www.instagram.com/tallinnbeersnacks" target="_blank" aria-label="Instagram">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
          </a>
          <a href="https://www.tiktok.com/@beer_and_snacks.tallinn" target="_blank" aria-label="TikTok">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 15.68a6.34 6.34 0 0012.67-1.48V8.15a8.4 8.4 0 004.22 1.21V5.91a4.91 4.91 0 01-2.3-.43z"/>
            </svg>
          </a>
        </div>
        <div class="footer__delivery">
          <a href="https://wolt.com/en/est/tallinn/venue/beer-snacks-beer?srsltid=AfmBOopbIbzanCZyCnHRwrCGFtZpTw1MaLAyy1uJpd4UBSjYHxyTaoUH" target="_blank" class="delivery-btn delivery-btn--wolt">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <!-- Simple Wolt placeholder icon -->
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.48 0-4.5-2.02-4.5-4.5h2c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5h2c0 2.48-2.02 4.5-4.5 4.5zm0-9c-2.48 0-4.5 2.02-4.5 4.5h-2c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5h-2c0-2.48-2.02-4.5-4.5-4.5z"/>
            </svg>
            Order on Wolt
          </a>
          <a href="https://food.bolt.eu/en/1-tallinn/p/143802-beersnacks/" target="_blank" class="delivery-btn delivery-btn--bolt">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <!-- Simple Bolt placeholder icon -->
              <path d="M13 2L3 14h7v8l10-12h-7L13 2z"/>
            </svg>
            Order on Bolt Food
          </a>
        </div>
      </div>

      <div class="footer__bottom" id="footer-rights">© 2026 Beer&amp;Snacks. All rights reserved.</div>
    </footer>

  </div>

  <!-- ── Scroll to Top Button ── -->
  <button id="scrollToTopBtn" class="scroll-to-top" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- ── Scripts ── -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
