<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="12" fill="#f5f5f5"/>
  <g stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Bag -->
    <rect x="24" y="24" width="32" height="34" rx="3" fill="#e8e8e8" stroke="#333"/>
    <!-- Bag top -->
    <path d="M24 30h32"/>
    <!-- Crackers -->
    <rect x="30" y="36" width="8" height="6" rx="1" fill="#ddd" stroke="#333" transform="rotate(-5 34 39)"/>
    <rect x="40" y="34" width="8" height="6" rx="1" fill="#ddd" stroke="#333" transform="rotate(8 44 37)"/>
    <rect x="34" y="44" width="8" height="6" rx="1" fill="#ddd" stroke="#333" transform="rotate(-3 38 47)"/>
    <!-- Dots on crackers -->
    <circle cx="34" cy="39" r="0.5" fill="#bbb"/>
    <circle cx="44" cy="37" r="0.5" fill="#bbb"/>
  </g>
</svg>
